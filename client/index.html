<!doctype html>
<html lang="sv">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Femkamp</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        >
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-expand-lg bg-white border-bottom">
            <div class="container">
                <span class="navbar-brand mb-0 h1">Femkamp</span>
                <button class="btn btn-primary" type="button" id="refresh-button">
                    Uppdatera resultat
                </button>
            </div>
        </nav>

        <main class="container py-4">
            <div class="d-flex flex-column gap-3" id="game-results">
                <div class="alert alert-secondary mb-0" role="status">
                    Laddar resultat...
                </div>
            </div>
        </main>

        <script>
            const gameResultsElement = document.getElementById("game-results");
            const refreshButton = document.getElementById("refresh-button");

            function escapeHtml(value) {
                return String(value ?? "")
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;")
                    .replaceAll('"', "&quot;")
                    .replaceAll("'", "&#039;");
            }

            function formatDate(dateValue) {
                if (!dateValue) {
                    return "Inget datum";
                }

                return new Intl.DateTimeFormat("sv-SE").format(new Date(dateValue));
            }

            function formatResultCell(result) {
                if (!result || result.value === null || result.value === undefined) {
                    return '<span class="text-muted">Saknas</span>';
                }

                const unit = result.unit ? ` ${escapeHtml(result.unit)}` : "";
                const rank = result.rank ? `${result.rank}` : "-";

                return `
                    <div class="d-flex flex-column gap-1">
                        <span>${escapeHtml(result.value)}${unit}</span>
                        <span class="badge text-bg-secondary align-self-start">
                            Placering ${rank}
                        </span>
                    </div>
                `;
            }

            function renderGameTable(game) {
                const disciplineHeaders = game.disciplines.map((discipline) => `
                    <th scope="col">
                        <div class="d-flex flex-column">
                            <span>${escapeHtml(discipline.name)}</span>
                            <small class="text-muted">
                                ${discipline.low_best ? "Lägst vinner" : "Högst vinner"}
                            </small>
                        </div>
                    </th>
                `).join("");

                const playerRows = game.players.map((player) => {
                    const resultCells = game.disciplines.map((discipline) => {
                        const result = player.disciplines[String(discipline.id)];
                        return `<td>${formatResultCell(result)}</td>`;
                    }).join("");

                    return `
                        <tr>
                            <th scope="row">${escapeHtml(player.player_name)}</th>
                            ${resultCells}
                            <td>
                                <div class="d-flex flex-column gap-1">
                                    <span>
                                        ${player.total_rank_score ?? "Saknas"} placeringspoäng
                                    </span>
                                    <span class="badge text-bg-primary align-self-start">
                                        Totalt ${player.total_place ?? "-"}
                                    </span>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join("");

                return `
                    <section class="card shadow-sm">
                        <div class="card-header bg-white">
                            <div class="d-flex flex-column flex-md-row justify-content-between gap-2">
                                <div>
                                    <h2 class="h5 mb-1">${escapeHtml(game.name)}</h2>
                                    <div class="text-muted">
                                        ${formatDate(game.date)}
                                        ${game.occasion ? ` · ${escapeHtml(game.occasion)}` : ""}
                                    </div>
                                </div>
                                <span class="badge ${game.is_active ? "text-bg-success" : "text-bg-dark"} align-self-start">
                                    ${game.is_active ? "Aktiv" : "Avslutad"}
                                </span>
                            </div>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-striped table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col">Spelare</th>
                                        ${disciplineHeaders}
                                        <th scope="col">Total placering</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${playerRows}
                                </tbody>
                            </table>
                        </div>
                    </section>
                `;
            }

            async function loadGameResults() {
                refreshButton.disabled = true;
                gameResultsElement.innerHTML = `
                    <div class="alert alert-secondary mb-0" role="status">
                        Laddar resultat...
                    </div>
                `;

                try {
                    const response = await fetch("/api/game-results");

                    if (!response.ok) {
                        throw new Error("Kunde inte hämta resultat.");
                    }

                    const games = await response.json();

                    gameResultsElement.innerHTML = games.length
                        ? games.map(renderGameTable).join("")
                        : `
                            <div class="alert alert-info mb-0">
                                Det finns inga sparade spel ännu.
                            </div>
                        `;
                } catch (error) {
                    gameResultsElement.innerHTML = `
                        <div class="alert alert-danger mb-0">
                            ${error.message}
                        </div>
                    `;
                } finally {
                    refreshButton.disabled = false;
                }
            }

            refreshButton.addEventListener("click", loadGameResults);
            loadGameResults();
        </script>
    </body>
</html>
